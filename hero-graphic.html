<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Hero Graphic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'Outfit', sans-serif;
  }

  .scene { width: 580px; height: 580px; position: relative; }

  /* === LIGHTER PLATFORM === */
  .platform {
    position: absolute;
    width: 520px; height: 520px;
    left: 30px; top: 30px;
    background: linear-gradient(180deg, #1c2a62 0%, #182358 40%, #152050 100%);
    border-radius: 32px;
    box-shadow:
      0 8px 0 #111a40,
      0 16px 0 #0e1535,
      0 30px 80px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(100, 150, 255, 0.14);
    animation: platformFloat 6s ease-in-out infinite;
    overflow: hidden;
  }
  .platform::after {
    content: '';
    position: absolute; inset: 1px;
    border-radius: 31px;
    border: 1px solid rgba(90, 140, 255, 0.1);
    pointer-events: none; z-index: 10;
  }

  /* Chicago skyline — more visible */
  .skyline-bg {
    position: absolute; inset: 0;
    border-radius: 32px; overflow: hidden;
    opacity: 0.16;
    filter: blur(1px);
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 55%, transparent 85%);
    mask-image: linear-gradient(to bottom, black 0%, black 55%, transparent 85%);
  }
  .skyline-bg svg { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; }

  .grid {
    position: absolute; inset: 0;
    border-radius: 32px; overflow: hidden;
    opacity: 0.03;
    background-image:
      linear-gradient(rgba(130,180,255,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(130,180,255,0.5) 1px, transparent 1px);
    background-size: 32px 32px; z-index: 1;
  }

  @keyframes platformFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

  /* Glows */
  .glow { position: absolute; border-radius: 50%; filter: blur(50px); pointer-events: none; z-index: 0; }
  .glow-1 { width: 220px; height: 220px; background: #2a55dd; opacity: 0.1; left: 30px; top: 50px; }
  .glow-2 { width: 180px; height: 180px; background: #3366ff; opacity: 0.07; left: 300px; top: 280px; }
  .glow-3 { width: 160px; height: 160px; background: #1a44dd; opacity: 0.08; left: 180px; top: 140px; }

  /* Particles */
  .particle { position: absolute; border-radius: 50%; animation: particleDrift linear infinite; opacity: 0; z-index: 2; }
  .particle:nth-child(1) { width: 3px; height: 3px; background: #5599ff; left: 100px; top: 140px; animation-delay: 0s; animation-duration: 8s; }
  .particle:nth-child(2) { width: 3px; height: 3px; background: #fff; left: 340px; top: 230px; animation-delay: 2s; animation-duration: 10s; }
  .particle:nth-child(3) { width: 3px; height: 3px; background: #7799ff; left: 190px; top: 380px; animation-delay: 4s; animation-duration: 7s; }
  .particle:nth-child(4) { width: 2px; height: 2px; background: #4477ff; left: 430px; top: 160px; animation-delay: 1s; animation-duration: 9s; }
  .particle:nth-child(5) { width: 3px; height: 3px; background: #fff; left: 270px; top: 320px; animation-delay: 3s; animation-duration: 11s; }
  .particle:nth-child(6) { width: 2px; height: 2px; background: #5599ff; left: 410px; top: 100px; animation-delay: 5s; animation-duration: 6s; }
  @keyframes particleDrift { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.6; } 100% { transform: translateY(-80px); opacity: 0; } }

  /* Stars */
  .star { position: absolute; animation: starTwinkle 3s ease-in-out infinite; z-index: 3; }
  .star svg { filter: drop-shadow(0 0 4px rgba(255,255,255,0.5)); }
  .star-1 { left: 80px; top: 55px; } .star-2 { left: 470px; top: 70px; animation-delay: 1s; }
  .star-3 { left: 500px; top: 170px; animation-delay: 2s; } .star-4 { left: 65px; top: 450px; animation-delay: 0.5s; }
  .star-5 { left: 290px; top: 500px; animation-delay: 1.5s; }
  @keyframes starTwinkle { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } }

  /* Items container */
  .items { position: absolute; left: 50px; top: 50px; width: 480px; height: 480px; z-index: 5; }

  /* ============================================ */
  /* DESK + MONITOR                               */
  /* ============================================ */
  .desk { position: absolute; left: 5px; top: 55px; }
  .desk-surface {
    width: 190px; height: 13px;
    background: linear-gradient(180deg, #243270, #1c2a60);
    border-radius: 5px; position: relative;
    box-shadow: 0 3px 0 #141e48, 0 0 12px rgba(50,90,230,0.1);
    border: 1px solid rgba(80,130,255,0.12);
  }
  .desk-legs { position: absolute; top: 13px; left: 12px; right: 12px; height: 55px; }
  .d-leg { position: absolute; width: 5px; height: 55px; background: linear-gradient(180deg, #1e2d58, #162048); border-radius: 2px; }
  .d-leg:nth-child(1) { left: 0; } .d-leg:nth-child(2) { right: 0; }

  .monitor { position: absolute; left: 18px; top: -98px; }
  .monitor-frame {
    width: 152px; height: 90px;
    background: #0c1430;
    border-radius: 7px; border: 2px solid #243270;
    overflow: hidden; position: relative;
    box-shadow: 0 0 25px rgba(50,90,255,0.15);
    animation: monitorGlow 4s ease-in-out infinite;
  }
  @keyframes monitorGlow { 0%, 100% { box-shadow: 0 0 20px rgba(50,90,255,0.1); } 50% { box-shadow: 0 0 35px rgba(50,90,255,0.22); } }

  .chart-bars { display: flex; align-items: flex-end; gap: 4px; padding: 16px 9px 9px; height: 100%; }
  .chart-bar { flex: 1; border-radius: 2px 2px 0 0; animation: barGrow 2s ease-in-out infinite alternate; }
  .chart-bar:nth-child(1) { background: #2255ee; height: 30%; animation-delay: 0s; }
  .chart-bar:nth-child(2) { background: #3366ff; height: 55%; animation-delay: 0.15s; }
  .chart-bar:nth-child(3) { background: #1a44dd; height: 40%; animation-delay: 0.3s; }
  .chart-bar:nth-child(4) { background: #4488ff; height: 70%; animation-delay: 0.45s; }
  .chart-bar:nth-child(5) { background: #2255ee; height: 85%; animation-delay: 0.6s; }
  .chart-bar:nth-child(6) { background: #5599ff; height: 60%; animation-delay: 0.75s; }
  .chart-bar:nth-child(7) { background: #1a44dd; height: 45%; animation-delay: 0.9s; }
  .chart-bar:nth-child(8) { background: #3366ff; height: 90%; animation-delay: 1.05s; }
  .chart-bar:nth-child(9) { background: #4488ff; height: 50%; animation-delay: 1.2s; }
  @keyframes barGrow { 0% { transform: scaleY(0.4); } 100% { transform: scaleY(1); } }

  .trend-line { position: absolute; top: 8px; left: 7px; width: 134px; height: 42px; }
  .trend-line svg { width: 100%; height: 100%; }
  .trend-path { fill: none; stroke: #fff; stroke-width: 2; stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 3s ease-in-out infinite; filter: drop-shadow(0 0 5px rgba(255,255,255,0.4)); }
  @keyframes drawLine { 0% { stroke-dashoffset: 200; } 50% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -200; } }

  .monitor-stand { width: 34px; height: 9px; background: #243270; margin: 0 auto; border-radius: 0 0 3px 3px; }
  .monitor-base { width: 50px; height: 4px; background: #243270; margin: 0 auto; border-radius: 3px; }

  .metric-float { position: absolute; animation: metricFloat 3s ease-in-out infinite; }
  .metric-float svg { filter: drop-shadow(0 0 5px rgba(70,120,255,0.4)); }
  .metric-1 { left: -8px; top: -118px; } .metric-2 { left: 68px; top: -132px; animation-delay: 0.5s; } .metric-3 { left: 160px; top: -114px; animation-delay: 1s; }
  @keyframes metricFloat { 0%, 100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-9px); opacity: 0.7; } }

  /* ============================================ */
  /* PHONE                                        */
  /* ============================================ */
  .phone-wrap { position: absolute; left: 230px; top: 20px; animation: phoneFloat 5s ease-in-out infinite; }
  @keyframes phoneFloat { 0%, 100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-8px) rotate(-1deg); } }
  .phone-body { width: 60px; height: 118px; background: linear-gradient(180deg, #1c2a62 0%, #142048 100%); border-radius: 13px; border: 2px solid #243270; overflow: hidden; position: relative; box-shadow: 0 6px 25px rgba(0,0,0,0.3), 0 0 18px rgba(50,90,255,0.1); }
  .phone-notch { width: 24px; height: 5px; background: #142048; border-radius: 0 0 5px 5px; margin: 0 auto; z-index: 2; position: relative; }
  .phone-screen { margin: 3px 4px; width: 48px; height: 98px; border-radius: 7px; background: #0a1228; overflow: hidden; position: relative; }
  .social-feed { position: absolute; top: 0; left: 0; width: 100%; animation: scrollFeed 8s linear infinite; }
  .feed-item { width: 38px; height: 18px; margin: 3px 5px; border-radius: 3px; opacity: 0.85; }
  .feed-item:nth-child(odd) { background: linear-gradient(135deg, #2855cc, #3060ee); }
  .feed-item:nth-child(even) { background: linear-gradient(135deg, #2040aa, #1a38bb); }
  .feed-item:nth-child(3n) { background: linear-gradient(135deg, #3366ff, #4488ff); height: 26px; }
  @keyframes scrollFeed { 0% { transform: translateY(0); } 100% { transform: translateY(-140px); } }

  .notif { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; animation: notifPop 2s ease-in-out infinite; z-index: 5; }
  .notif-heart { width: 25px; height: 25px; background: linear-gradient(135deg, #1a3aff, #0022cc); top: -6px; right: -13px; box-shadow: 0 0 16px rgba(30,60,255,0.5); }
  .notif-comment { width: 22px; height: 22px; background: linear-gradient(135deg, #3366ff, #2255ee); top: 26px; right: -16px; animation-delay: 0.7s; box-shadow: 0 0 14px rgba(50,100,255,0.5); }
  .notif-share { width: 20px; height: 20px; background: #fff; color: #1a3aff; top: 55px; right: -10px; animation-delay: 1.4s; box-shadow: 0 0 14px rgba(255,255,255,0.3); }
  @keyframes notifPop { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

  .reaction { position: absolute; font-size: 12px; animation: reactionFloat 4s ease-out infinite; opacity: 0; }
  .reaction:nth-child(1) { left: -16px; top: 6px; } .reaction:nth-child(2) { left: 62px; top: 30px; animation-delay: 1.3s; } .reaction:nth-child(3) { left: 20px; top: -10px; animation-delay: 2.6s; }
  @keyframes reactionFloat { 0% { opacity: 0; transform: translateY(8px); } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-40px); } }

  /* ============================================ */
  /* TURNTABLE                                    */
  /* ============================================ */
  .turntable-wrap { position: absolute; left: 0px; top: 210px; }
  .turntable-base { width: 165px; height: 102px; background: linear-gradient(180deg, #1a2348 0%, #121a38 100%); border-radius: 9px; border: 1px solid #243270; position: relative; overflow: hidden; box-shadow: 0 5px 18px rgba(0,0,0,0.3); }
  .vinyl { position: absolute; width: 74px; height: 74px; left: 8px; top: 14px; border-radius: 50%; background: radial-gradient(circle at center, #2a2a44 7px, transparent 7px), radial-gradient(circle at center, #18182a 9px, transparent 9px), repeating-radial-gradient(circle at center, transparent 11px, rgba(255,255,255,0.03) 12px, transparent 13px), conic-gradient(from 0deg, #10101a, #1a1a2a, #10101a, #1a1a2a, #10101a); animation: spin 2s linear infinite; box-shadow: 0 0 18px rgba(50,80,255,0.1); }
  .vinyl-label { position: absolute; width: 20px; height: 20px; left: 50%; top: 50%; transform: translate(-50%,-50%); border-radius: 50%; background: linear-gradient(135deg, #2244cc, #3366ff); }
  .vinyl-dot { position: absolute; width: 5px; height: 5px; left: 50%; top: 50%; transform: translate(-50%,-50%); border-radius: 50%; background: #121a38; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .tonearm { position: absolute; right: 20px; top: 9px; width: 3px; height: 48px; background: linear-gradient(180deg, #8899bb, #556688); border-radius: 2px; transform-origin: top center; animation: tonearmSwing 8s ease-in-out infinite; }
  .tonearm::before { content: ''; position: absolute; top: -3px; left: -3px; width: 9px; height: 9px; background: #667799; border-radius: 50%; }
  .tonearm::after { content: ''; position: absolute; bottom: -2px; left: -3px; width: 9px; height: 5px; background: #8899bb; border-radius: 2px; }
  @keyframes tonearmSwing { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(-5deg); } }

  .mixer { position: absolute; right: 9px; bottom: 7px; display: flex; gap: 3px; }
  .slider-track { width: 5px; height: 28px; background: #0c1225; border-radius: 3px; position: relative; overflow: hidden; border: 1px solid #1e2a50; }
  .slider-fill { position: absolute; bottom: 0; width: 100%; border-radius: 2px; animation: sliderBounce 1.5s ease-in-out infinite; }
  .slider-track:nth-child(1) .slider-fill { height: 60%; background: #2255ee; } .slider-track:nth-child(2) .slider-fill { height: 80%; background: #3366ff; animation-delay: 0.2s; } .slider-track:nth-child(3) .slider-fill { height: 45%; background: #4488ff; animation-delay: 0.4s; } .slider-track:nth-child(4) .slider-fill { height: 70%; background: #fff; animation-delay: 0.6s; }
  @keyframes sliderBounce { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.5); } }

  .sound-waves { position: absolute; left: 30px; top: -26px; display: flex; gap: 3px; align-items: center; }
  .wave-bar { width: 3px; border-radius: 2px; animation: waveBar 0.8s ease-in-out infinite alternate; }
  .wave-bar:nth-child(1) { height: 10px; background: #2255ee; } .wave-bar:nth-child(2) { height: 18px; background: #3366ff; animation-delay: 0.1s; } .wave-bar:nth-child(3) { height: 25px; background: #5599ff; animation-delay: 0.2s; } .wave-bar:nth-child(4) { height: 14px; background: #fff; animation-delay: 0.3s; } .wave-bar:nth-child(5) { height: 22px; background: #3366ff; animation-delay: 0.4s; } .wave-bar:nth-child(6) { height: 12px; background: #2255ee; animation-delay: 0.5s; } .wave-bar:nth-child(7) { height: 20px; background: #5599ff; animation-delay: 0.6s; } .wave-bar:nth-child(8) { height: 9px; background: #fff; animation-delay: 0.7s; }
  @keyframes waveBar { 0% { transform: scaleY(0.3); } 100% { transform: scaleY(1); } }

  /* ============================================ */
  /* AIRPODS MAX                                  */
  /* ============================================ */
  .airpods-max { position: absolute; left: 185px; top: 180px; animation: hpFloat 5s ease-in-out infinite; animation-delay: 1.5s; }
  @keyframes hpFloat { 0%, 100% { transform: translateY(0) rotate(8deg); } 50% { transform: translateY(-7px) rotate(10deg); } }
  .apm-headband { width: 62px; height: 22px; border-radius: 31px 31px 0 0; position: relative; }
  .apm-headband-mesh { width: 62px; height: 22px; border-radius: 31px 31px 0 0; background: linear-gradient(180deg, #c8ccd5, #b0b5c0); }
  .apm-headband-mesh::after { content: ''; position: absolute; inset: 3px 7px; border-radius: 26px 26px 0 0; background: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 3px); }
  .apm-frame-l, .apm-frame-r { position: absolute; width: 3px; height: 38px; background: linear-gradient(180deg, #b0b5c0, #9ca0aa); border-radius: 2px; top: 16px; }
  .apm-frame-l { left: 3px; } .apm-frame-r { right: 3px; }
  .apm-cup { position: absolute; width: 26px; height: 32px; background: linear-gradient(180deg, #d4d8e0, #bcc0ca); border-radius: 7px; top: 42px; box-shadow: 0 2px 7px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.5); }
  .apm-cup::after { content: ''; position: absolute; width: 18px; height: 22px; left: 50%; top: 50%; transform: translate(-50%,-50%); border-radius: 4px; background: radial-gradient(ellipse, #a8acb8, #9498a5); border: 1px solid rgba(255,255,255,0.15); }
  .apm-cup-l { left: -4px; } .apm-cup-r { right: -4px; }
  .apm-crown { position: absolute; width: 7px; height: 7px; background: #9498a5; border-radius: 50%; right: -8px; top: 48px; border: 1px solid #b0b5c0; }

  /* ============================================ */
  /* XBOX 360 CONTROLLER (white/blue brand)       */
  /* ============================================ */
  .xbox-wrap {
    position: absolute;
    left: 300px; top: 240px;
    animation: xboxFloat 4.8s ease-in-out infinite;
    animation-delay: 0.8s;
  }
  @keyframes xboxFloat { 0%, 100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-8px) rotate(-2deg); } }

  .xbox-controller { width: 100px; height: 68px; position: relative; }

  /* Center body — rounded 360 shape */
  .xbox-body {
    position: absolute;
    width: 56px; height: 34px;
    left: 22px; top: 8px;
    background: linear-gradient(180deg, #e8ecf5 0%, #d8dde8 60%, #c8cdd8 100%);
    border-radius: 10px 10px 18px 18px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.25), 0 0 18px rgba(50,90,255,0.08);
    border: 1px solid rgba(255,255,255,0.3);
  }

  /* Top ridge/battery bump */
  .xbox-top-ridge {
    position: absolute;
    width: 30px; height: 8px;
    left: 35px; top: 4px;
    background: linear-gradient(180deg, #dde0ea, #d0d4e0);
    border-radius: 6px 6px 0 0;
    border: 1px solid rgba(255,255,255,0.2);
    border-bottom: none;
  }

  /* Grips — curved 360 style */
  .xbox-grip-l, .xbox-grip-r {
    position: absolute;
    width: 26px; height: 36px;
    background: linear-gradient(180deg, #e0e4ee 0%, #ccd0da 50%, #b8bcc8 100%);
    bottom: -6px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .xbox-grip-l {
    left: 2px;
    border-radius: 14px 6px 16px 14px;
    transform: rotate(14deg);
  }
  .xbox-grip-r {
    right: 2px;
    border-radius: 6px 14px 14px 16px;
    transform: rotate(-14deg);
  }

  /* Gray bottom accent */
  .xbox-bottom {
    position: absolute;
    width: 56px; height: 8px;
    left: 22px; bottom: 2px;
    background: linear-gradient(180deg, #a0a5b2, #8a8f9c);
    border-radius: 0 0 18px 18px;
  }

  /* Bumpers */
  .xbox-bumper-l, .xbox-bumper-r {
    position: absolute;
    width: 22px; height: 7px;
    background: linear-gradient(180deg, #d8dce5, #c8ccd8);
    top: 4px;
    border-radius: 4px 4px 0 0;
    border: 1px solid rgba(255,255,255,0.15);
    border-bottom: none;
  }
  .xbox-bumper-l { left: 18px; }
  .xbox-bumper-r { right: 18px; }

  /* Left thumbstick (gray, raised) */
  .xbox-stick-l {
    position: absolute;
    width: 13px; height: 13px;
    background: radial-gradient(circle at 40% 35%, #b0b5c0, #8a8f9c);
    border-radius: 50%;
    left: 28px; top: 14px;
    border: 1px solid #c0c5d0;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.15);
  }
  /* Stick dots */
  .xbox-stick-l::after {
    content: '';
    position: absolute;
    width: 3px; height: 3px;
    left: 50%; top: 50%; transform: translate(-50%,-50%);
    border-radius: 50%;
    background: rgba(0,0,0,0.1);
  }

  /* D-pad (metallic cross) */
  .xbox-dpad {
    position: absolute;
    left: 30px; top: 30px;
    width: 14px; height: 14px;
  }
  .dpad-h { position: absolute; width: 14px; height: 5px; top: 4.5px; left: 0; background: linear-gradient(180deg, #bcc0cc, #a0a4b0); border-radius: 1.5px; border: 0.5px solid #d0d4e0; }
  .dpad-v { position: absolute; width: 5px; height: 14px; top: 0; left: 4.5px; background: linear-gradient(90deg, #bcc0cc, #a0a4b0); border-radius: 1.5px; border: 0.5px solid #d0d4e0; }

  /* Xbox Guide button (center, green ring) */
  .xbox-guide {
    position: absolute;
    width: 12px; height: 12px;
    left: 50%; top: 14px;
    transform: translateX(-50%);
    background: radial-gradient(circle, #e8ecf0 40%, #d0d4dd 100%);
    border-radius: 50%;
    border: 2px solid #55aa44;
    box-shadow: 0 0 8px rgba(85,170,68,0.4);
    animation: guidePulse 2.5s ease-in-out infinite;
  }
  .xbox-guide::after {
    content: '';
    position: absolute;
    width: 4px; height: 4px;
    left: 50%; top: 50%; transform: translate(-50%,-50%);
    background: #55aa44;
    border-radius: 50%;
  }
  @keyframes guidePulse { 0%, 100% { box-shadow: 0 0 6px rgba(85,170,68,0.3); } 50% { box-shadow: 0 0 14px rgba(85,170,68,0.6); } }

  /* Back / Start buttons */
  .xbox-small-btn {
    position: absolute;
    width: 6px; height: 4px;
    background: #c0c5d0;
    border-radius: 2px;
    top: 18px;
  }
  .xbox-back-btn { left: 42px; }
  .xbox-start-btn { right: 38px; }

  /* ABXY buttons (colored) */
  .xbox-btns { position: absolute; right: 24px; top: 13px; width: 24px; height: 24px; }
  .xbox-btn { position: absolute; width: 8px; height: 8px; border-radius: 50%; box-shadow: inset 0 1px 2px rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.1); }
  .xbox-btn-a { bottom: 0; left: 8px; background: radial-gradient(circle at 40% 35%, #44cc55, #228833); }
  .xbox-btn-b { right: 0; top: 8px; background: radial-gradient(circle at 40% 35%, #ee3344, #cc1122); }
